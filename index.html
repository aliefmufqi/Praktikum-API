<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Informasi Mahasiswa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Sistem Informasi Mahasiswa</h1>
        <p>Manajemen Data Mahasiswa Berbasis REST API</p>
    </header>

    <main>
        <div class="top-bar">
            <button class="btn tambah">+ Tambah Mahasiswa</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>NPM</th>
                    <th>Nama</th>
                    <th>Jurusan</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                <!-- Contoh data (nanti dari API) -->
                <tr>
                    <td>1</td>
                    <td>221001</td>
                    <td>Budi Santoso</td>
                    <td>Informatika</td>
                    <td>
                        <button class="btn edit">Edit</button>
                        <button class="btn hapus">Hapus</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
<!-- Modal Form -->
<div class="modal" id="modalForm">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modalTitle">Tambah Mahasiswa</h2>

        <form id="formMahasiswa">
            <input type="hidden" id="id">

            <label>NPM</label>
            <input type="text" id="npm" required>

            <label>Nama</label>
            <input type="text" id="nama" required>

            <label>Jurusan</label>
            <input type="text" id="jurusan" required>

            <button type="submit" class="btn simpan">Simpan</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
    <footer>
        <p>© 2026 Praktikum API</p>
    </footer>

</body>
</html>
